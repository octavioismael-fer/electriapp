<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ElectriApp">
<title>ElectriApp</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --acento: #f59e0b;
    --texto: #f1f5f9;
    --subtexto: #94a3b8;
    --ok: #22c55e;
    --error: #ef4444;
    --radius: 12px;
  }
  body {
    background: var(--bg);
    color: var(--texto);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding-bottom: 80px;
  }
  .topbar {
    background: var(--surface);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--surface2);
  }
  .topbar .logo { font-size: 22px; }
  .topbar h1 { font-size: 18px; font-weight: 700; color: var(--acento); flex: 1; }
  .topbar a { color: var(--subtexto); text-decoration: none; font-size: 14px; }
  .content { padding: 16px; max-width: 480px; margin: 0 auto; }
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
  }
  .card-label { font-size: 12px; color: var(--subtexto); margin-bottom: 4px; }
  .card-value { font-size: 28px; font-weight: 700; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 12px 20px; border-radius: var(--radius);
    font-size: 15px; font-weight: 600; text-decoration: none;
    border: none; cursor: pointer; transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.8; }
  .btn-primary { background: var(--acento); color: #0f172a; }
  .btn-danger { background: transparent; color: var(--error); border: 1px solid var(--error); }
  .btn-block { width: 100%; justify-content: center; }
  .fab {
    position: fixed; bottom: 24px; right: 20px;
    width: 58px; height: 58px; border-radius: 50%;
    background: var(--acento); color: #0f172a;
    font-size: 28px; font-weight: 300;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; box-shadow: 0 4px 20px rgba(245,158,11,0.4);
    border: none; cursor: pointer;
  }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--subtexto); margin-bottom: 6px; }
  .field input, .field textarea {
    width: 100%; padding: 12px 14px;
    background: var(--surface); border: 1.5px solid var(--surface2);
    border-radius: var(--radius); color: var(--texto);
    font-size: 16px; outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--acento); }
  .field textarea { min-height: 90px; resize: vertical; font-family: inherit; }
  .mes-nav {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border-radius: var(--radius);
    padding: 12px 16px; margin-bottom: 14px;
  }
  .mes-nav a { color: var(--acento); font-size: 24px; text-decoration: none; padding: 0 8px; }
  .mes-nav .mes-label { font-size: 17px; font-weight: 700; }
  .mes-nav .total-label { font-size: 13px; color: var(--subtexto); }
  .trabajo-item {
    background: var(--surface); border-radius: var(--radius);
    padding: 14px; margin-bottom: 8px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .trabajo-fecha { color: var(--acento); font-size: 13px; font-weight: 700; min-width: 38px; }
  .trabajo-info { flex: 1; }
  .trabajo-cliente { font-size: 14px; font-weight: 700; }
  .trabajo-desc { font-size: 13px; color: var(--subtexto); margin-top: 2px; }
  .trabajo-monto { font-size: 16px; font-weight: 700; color: var(--ok); white-space: nowrap; }
  .divider { height: 1px; background: var(--surface2); margin: 14px 0; }
  .empty { text-align: center; padding: 48px 0; color: var(--subtexto); }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .tag {
    display: inline-block; padding: 4px 10px;
    background: var(--surface2); border-radius: 20px;
    font-size: 12px; color: var(--subtexto);
  }
  .resumen-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid var(--surface2);
    text-decoration: none; color: var(--texto);
  }
  .resumen-item:last-child { border-bottom: none; }
  .resumen-nombre { font-size: 14px; font-weight: 600; }
  .resumen-cant { font-size: 12px; color: var(--subtexto); }
  .resumen-total { font-size: 15px; font-weight: 700; color: var(--ok); }
  .back-btn { color: var(--subtexto); text-decoration: none; font-size: 14px; }
  #sugerencias {
    background: var(--surface2); border-radius: var(--radius);
    margin-top: -8px; margin-bottom: 14px; overflow: hidden; display: none;
  }
  .sugerencia {
    padding: 12px 14px; cursor: pointer; font-size: 14px;
    border-bottom: 1px solid var(--surface);
  }
  .sugerencia:last-child { border-bottom: none; }
  .sugerencia:active { background: var(--surface); }
</style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
